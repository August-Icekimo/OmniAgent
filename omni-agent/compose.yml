services:
  postgres:
    image: docker.io/pgvector/pgvector:pg18-trixie
    container_name: omni-agent-postgres-1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-omni_agent}
      TZ: Asia/Taipe
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./memory/postgres:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni} -d ${POSTGRES_DB:-omni_agent}" ]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: omni-agent-gateway-1
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8086}:8086"
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
    environment:
      TZ: Asia/Taipe

  brain:
    build:
      context: ./brain
    container_name: omni-agent-brain-1
    env_file:
      - .env
    ports:
      - "${BRAIN_PORT:-8000}:8000"
    volumes:
      - ./SOUL.md:/SOUL.md:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei

  skills:
    build:
      context: ./skills
    container_name: omni-agent-skills-1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
